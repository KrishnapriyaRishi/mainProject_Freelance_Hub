<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Booking Form</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="/static/css/bookingForm.css">
</head>
<body>

<!-- ── Page Header ── -->
<div class="page-header">
 
  <h1>Booking Details</h1>
  <p>Edit the details below to book the service.</p>
  <p>Service - {{service.name}}</p>
</div>

<!-- ── Form Card ── -->
<div class="form-card">
 
  <div class="form-card-inner">

    <form id="bookingForm" method="post" enctype="multipart/form-data">

		{% csrf_token %}

      <!-- Service Name -->
      <div class="mb-3">
        
       {{form.as_p}}
      </div>

     

	  

      <!-- ── Action Row ── -->
      <div class="d-flex align-items-center gap-3 action-row">
        <button type="submit" class="btn-submit">
          <i class="bi bi-check2-circle"></i> Confirm Booking
        </button>
       <a href="{% url 'home' %}"><button type="button" class="btn-reset" id="resetBtn">
          <i class="bi bi-arrow-counterclockwise"></i> Cancel
        </button></a>
      </div>

    </form>
  </div>
</div>



<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
	/* ── Set min date to today ── */
  (function () {
    const dateInput = document.getElementById('dateInput');
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm   = String(today.getMonth() + 1).padStart(2, '0');
    const dd   = String(today.getDate()).padStart(2, '0');
    dateInput.min = `${yyyy}-${mm}-${dd}`;

    /* Extra guard: prevent typing a past date */
    dateInput.addEventListener('change', () => {
      if (dateInput.value && dateInput.value < dateInput.min) {
        dateInput.value = dateInput.min;
      }
    });
  })();

</script>

</body>
</html>
