<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customer Profile</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <link rel="stylesheet" href="/static/css/login.css" />
  </head>
  <body>
    <div
      class="container d-flex align-items-center justify-content-center vh-100"
    >
      <div
        class="main-login card w-100 bg-light py-5  d-flex flex-column gap-2"
      >
        <h3 class=" text-center">Profile</h3>

        <br />
        <div class="mb-3 lato-light">Name - {{prof.name}}</div>
        <div class="mb-3 lato-light">Age - {{prof.age}}</div>
        <div class="mb-3 lato-light">Location - {{prof.location}}</div>
        <div class="mb-3 lato-light">Address- {{prof.address}}</div>

        
          <a href="{% url 'editCustomerProfile' %}" class="btn btn-primary btn-lg mb-3 mx-4"
            >Edit Profile</a
          >
        
        
          <a href="{% url 'home' %}" class="btn btn-primary btn-lg mb-3 mx-4"
            >Back to home</a
          >
        
      </div>
    </div>
  </body>
</html>
