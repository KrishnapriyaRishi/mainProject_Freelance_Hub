<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Service Form</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="/static/css/addServices_admin.css">
</head>
<body>

<!-- ── Page Header ── -->
<div class="page-header">
 
  <h1>Update Your <em>Service</em></h1>
  <p>Edit the details below to update your service and reach new clients.</p>
</div>

<!-- ── Form Card ── -->
<div class="form-card">
 
  <div class="form-card-inner">

    <form id="serviceForm" method="post" enctype="multipart/form-data">

		{% csrf_token %}

      <!-- Service Name -->
      <div class="mb-3">
        <label class="form-label" for="{{ form.name.id_for_label }}">Service Name</label>
       
         {{ form.name }}
       
       
      </div>

      <!-- Description -->
      <div class="mb-3">
        <label class="form-label" for="{{ form.desc.id_for_label }}">Description</label>
        {{form.desc}}
    
      </div>


	   <!-- Category -->
      <div class="mb-3">
        <label class="form-label" for="{{ form.category.id_for_label }}">Category</label>
        {{form.category}}
    
      </div>

	   <!-- Price -->
      <div class="mb-3">
        <label class="form-label" for="{{ form.price.id_for_label }}">Price </label>
        {{form.price}}
    
      </div>
    <div class="mb-3">
        <label class="form-label" for="{{ form.is_available.id_for_label }}">Availability </label>
        {{form.is_available}}
    
      </div>

      <!-- ── Action Row ── -->
      <div class="d-flex align-items-center gap-3 action-row">
        <button type="submit" class="btn-submit">
          <i class="bi bi-check2-circle"></i> Edit Service
        </button>
       <a href="{% url 'listAllServicesAdmin' %}"><button type="button" class="btn-reset" id="resetBtn">
          <i class="bi bi-arrow-counterclockwise"></i> Cancel
        </button></a>
      </div>

    </form>
  </div>
</div>



<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>
</html>
