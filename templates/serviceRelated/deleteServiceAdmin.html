<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Delete Service</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <link rel="stylesheet" href="/static/css/addServices_admin.css">
</head>
<body>

<!-- ── Page Header ── -->
<div class="page-header">
 
  <h1>
	Are you sure you want to delete <em>{{pro.name}} </em>?
  </h1>
  <p>Choose your decision wisely.</p>
</div>

<!-- ── Form Card ── -->

 
  

    <form id="deleteServiceForm" method="post" enctype="multipart/form-data">

		{% csrf_token %}

      <!-- ── Action Row ── -->
      <div class="d-flex justify-content-center align-items-center gap-5">
        <button type="submit" class="btn-submit">
          <i class="bi bi-check2-circle"></i> Yes
        </button>
        

		<a href="{% url 'listAllServicesAdmin' %}"><button type="button" class="btn-reset" id="resetBtn">
          <i class="bi bi-arrow-counterclockwise"></i> No
        </button></a>
      </div>

    </form>
 




<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>


</body>
</html>
