{%extends 'base.html'%}
{%block title%}
<title>Review</title>
{%endblock%}
{%block content%}


<div class="card shadow border-0 rounded-4">

    <div class="card-body p-4">

        <h4 class="mb-4">
            Rate Your Experience
        </h4>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label>
                    Rating
                </label>

                <select
                    name="rating"
                    class="form-select"
                >

                    <option value="5">
                        5 Excellent
                    </option>

                    <option value="4">
                        4 Good
                    </option>

                    <option value="3">
                        3 Average
                    </option>

                    <option value="2">
                        2 Poor
                    </option>

                    <option value="1">
                        1 Bad
                    </option>

                </select>

            </div>

            <div class="mb-3">

                <textarea
                    name="comment"
                    class="form-control"
                    rows="4"
                    placeholder="Write your review"
                ></textarea>

            </div>

            <button type="submit" class="btn btn-primary w-100">

                Submit Review

            </button>

        </form>

    </div>

</div>

{%endblock%}
